name: OCREditor
options:
  bundleIdPrefix: com.hauchiehlin.ocreditor
targets:
  OCREditor:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - OCREditor
      - path: ../../core/src
        type: group
        name: Core
      - path: ../../core/include
        type: group
        name: Include
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.hauchiehlin.ocreditor
      CODE_SIGN_STYLE: Automatic
      DEVELOPMENT_TEAM: 6UJ8GS752W
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ENABLE_PREVIEWS: YES
      SWIFT_VERSION: 5.0
      GENERATE_INFOPLIST_FILE: YES
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0.0"
      SWIFT_OBJC_BRIDGING_HEADER: OCREditor/OCREditor-Bridging-Header.h
      HEADER_SEARCH_PATHS: '"$(inherited)" "$(SRCROOT)/../../core/include" "$(SRCROOT)/../../core/src"'
      CLANG_CXX_LANGUAGE_STANDARD: "c++17"
